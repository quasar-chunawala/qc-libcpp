name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || null }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Arch Linux (via Docker) ---
          # - preset: linux-gcc-x64-release
          #   runner: ubuntu-latest
          #   container: archlinux:latest
          #   os: archlinux

          # - preset: linux-gcc-x64-debug
          #   runner: ubuntu-latest
          #   container: archlinux:latest
          #   os: archlinux

          # - preset: linux-clang-x64-release
          #   runner: ubuntu-latest
          #   container: archlinux:latest
          #   os: archlinux

          # - preset: linux-clang-x64-debug
          #   runner: ubuntu-latest
          #   container: archlinux:latest
          #   os: archlinux

          # --- Ubuntu x86_64 ---
          - preset: linux-gcc-x64-release
            runner: ubuntu-latest
            os: ubuntu

          - preset: linux-gcc-x64-debug
            runner: ubuntu-latest
            os: ubuntu

          - preset: linux-clang-x64-release
            runner: ubuntu-latest
            os: ubuntu

          - preset: linux-clang-x64-debug
            runner: ubuntu-latest
            os: ubuntu

          # --- Ubuntu ARM64 ---
          - preset: linux-gcc-arm64-release
            runner: ubuntu-24.04-arm
            os: ubuntu

          - preset: linux-gcc-arm64-debug
            runner: ubuntu-24.04-arm
            os: ubuntu

          - preset: linux-clang-arm64-release
            runner: ubuntu-24.04-arm
            os: ubuntu

          - preset: linux-clang-arm64-debug
            runner: ubuntu-24.04-arm
            os: ubuntu

          # --- Windows x64 ---
          - preset: windows-msvc-x64-release
            runner: windows-latest
            os: windows

          - preset: windows-msvc-x64-debug
            runner: windows-latest
            os: windows

          - preset: windows-clang-x64-release
            runner: windows-latest
            os: windows

          - preset: windows-clang-x64-debug
            runner: windows-latest
            os: windows

          # --- macOS Apple Silicon (arm64) ---
          - preset: macos-appleclang-arm64-release
            runner: macos-latest
            os: macos

          - preset: macos-appleclang-arm64-debug
            runner: macos-latest
            os: macos

          - preset: macos-clang-arm64-release
            runner: macos-latest
            os: macos

          - preset: macos-clang-arm64-debug
            runner: macos-latest
            os: macos

          # --- macOS Intel (x64) ---
          - preset: macos-appleclang-x64-release
            runner: macos-13
            os: macos

          - preset: macos-appleclang-x64-debug
            runner: macos-13
            os: macos

          - preset: macos-clang-x64-release
            runner: macos-13
            os: macos

          - preset: macos-clang-x64-debug
            runner: macos-13
            os: macos

    steps:
      - uses: actions/checkout@v4

      # --- Arch Linux ---
      - name: Install dependencies (Arch)
        if: matrix.os == 'archlinux'
        run: pacman -Syu --noconfirm cmake ninja gcc clang

      # --- Ubuntu ---
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang

      # --- Windows: install Ninja (MSVC is pre-installed, clang via choco) ---
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows'
        run: choco install ninja --yes

      - name: Install clang (Windows)
        if: matrix.os == 'windows' && contains(matrix.preset, 'clang')
        run: choco install llvm --yes

      # --- macOS: install Ninja (compilers are pre-installed) ---
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install ninja cmake

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}