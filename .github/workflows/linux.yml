name: Linux x86 build
on: [push, pull_request]
defaults:
    run:
        shell: bash -l {0}

jobs:
    build:
        runs-on: ubuntu-latest
        name: '${{ matrix.sys.compiler }} ${{ matrix.sys.version }} - ${{ matrix.sys.flags }}'
        strategy:
            matrix:
                sys:
                    - { compiler: 'gcc', version: '11', flags: '-std=c++20 -Wall -Wpedantic'} 
                    - { compiler: 'gcc', version: '12', flags: '-std=c++20 -Wall -Wpedantic'}        
                    - { compiler: 'gcc', version: '13', flags: '-std=c++20 -Wall -Wpedantic'}
                    - { compiler: 'gcc', version: '14', flags: '-std=c++20 -Wall -Wpedantic'} 
                    - { compiler: 'gcc', version: '15', flags: '-std=c++20 -Wall -Wpedantic'}
                    - { compiler: 'gcc', version: '16', flags: '-std=c++20 -Wall -Wpedantic'}
                    - { compiler: 'clang', version: '16', flags: '-std=c++20 -Wall -Wpedantic'} 
                    - { compiler: 'clang', version: '17', flags: '-std=c++20 -Wall -Wpedantic'}        
                    - { compiler: 'clang', version: '18', flags: '-std=c++20 -Wall -Wpedantic'}

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup compiler
          if: ${{ matrix.sys.compiler == 'gcc' }}
          run: |
            GCC_VERSION=${{ matrix.sys.version }}
            sudo apt-get update
            sudo apt-get --no-install-suggests --no-install-recommends install g++-$GCC_VERSION
            sudo add-apt-repository ppa:ubuntu-toolchain-r/test
            sudo apt-get update
            echo "CXX=g++-$GCC_VERSION" >> $GITHUB_ENV

        - name: Setup compiler
          if: ${{ matrix.sys.compiler == 'clang' }}
          run: |
            LLVM_VERSION=${{ matrix.sys.version }}
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh $LLVM_VERSION
            sudo apt-get --no-install-suggests --no-install-recommends install clang-$LLVM_VERSION || exit 1
            sudo apt-get --no-install-suggests --no-install-recommends install g++ g++-multilib || exit 1
            CXX=clang++-$LLVM_VERSION
            echo "CXX=$CXX" >> $GITHUB_ENV

        - name: Configure
          env: 
            CXX: ${{ env.CXX }}
          run: |
            cmake -B build \
                  -DCMAKE_CXX_COMPILER=$CXX \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_CXX_FLAGS="${{ matrix.sys.flags }}"
        - name: Build
          run: cmake --build build --parallel 2                  
              